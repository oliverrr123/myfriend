# fly.toml app configuration file generated for api-nameless-water-1932 on 2026-02-01T13:55:27+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'api-nameless-water-1932'
primary_region = 'fra'

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep one machine warm: voice calls only hit this API for initCall, then again on
  # server tools (e.g. createReminder). Idle gap can exceed Fly's stop window so autostop
  # was tearing down the VM exactly when tools ran → timeouts / failed tool calls.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
